<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Marcus Lion Chess Player Analyser</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 900px; }
    input, button { font-size: 1rem; padding: .55rem; margin: .25rem 0; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 1.25rem; }
  </style>
</head>
<body>
  <h1>Marcus Lion Chess Player Analyser</h1>
  <p>Analyse any public Chess.com user's PGN archive.</p>
  <p><a href="/self-play">Run self-play harness</a></p>

  <div class="card">
    <form method="post" action="/analyse">
      <label>Chess.com username</label>
      <input name="username" value="mdvx01" required />

      <label>Timezone</label>
      <input name="timezone" value="America/New_York" />

      <label>Optional breakpoint</label>
      <input name="breakpoint_iso" value="" placeholder="2026-05-18T00:00:00-04:00" size="35" />

      <label><input type="checkbox" name="force_refresh" value="1" /> Force refresh from Chess.com</label>
      <button type="submit">Analyse</button>
    </form>
  </div>
</body>
</html>
